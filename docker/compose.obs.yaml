# Observability overlay — enable with `--profile obs`.
#
# Runs an OpenTelemetry Collector (core ≥ 1.49) that scrapes
# gateway/etl-worker via OTLP and a Prometheus that scrapes the
# collector's prom exporter. Not part of the default stack because
# the bare workspace doesn't emit traces or metrics yet — wire them
# up via tracing-opentelemetry as crates start needing observation.
#
# Run: docker compose -f docker/compose.yaml -f docker/compose.obs.yaml \
#                     --profile obs up -d

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.0
    profiles: [obs]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # internal metrics
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.0
    profiles: [obs]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - otel-collector

volumes:
  prom-data:
