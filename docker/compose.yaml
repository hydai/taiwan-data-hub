# Default Docker Compose for Taiwan Data Hub.
#
# Brings up:
#   - postgres   — PostgreSQL 18 with pgdata volume and pg_isready healthcheck
#   - gateway    — Axum HTTP gateway (waits for postgres healthy)
#   - web        — SvelteKit adapter-node app (waits for gateway healthy)
#   - etl-worker — placeholder cron-style binary (waits for postgres healthy)
#
# Profile `obs` is activated by compose.obs.yaml and adds opentelemetry-collector
# and prometheus. Future overlays (e.g. `full` for dragonfly + meilisearch +
# seaweedfs) will land as those services become required by upstream issues.
# Dev overrides (bind mounts + cargo watch) live in compose.dev.yaml.
#
# Build contexts use `..` (repo root) so Dockerfiles can see the whole
# monorepo. Run from the repo root with: `docker compose -f docker/compose.yaml up -d`.

name: taiwan-data-hub

services:
  postgres:
    image: postgres:18-bookworm
    # WARNING: the defaults below (POSTGRES_USER/_PASSWORD/_DB = tdh) are
    # for **local development only**. For any deployment beyond a laptop:
    #   1. Put real values in a .env file next to this compose.yaml
    #      (POSTGRES_PASSWORD=$(openssl rand -base64 24)), and
    #   2. Make sure that .env is .gitignore'd.
    # Compose will pick up .env automatically; the ${VAR:-default} syntax
    # only falls back to the literal "tdh" when the env var is unset.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tdh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tdh}
      POSTGRES_DB: ${POSTGRES_DB:-tdh}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    environment:
      GATEWAY_ADDR: 0.0.0.0:8080
      # `personal` (default) leaves every route open; `multi-user` will
      # gate API-key + contribution endpoints once #4.5 lands. Boot log
      # echoes which routes are public vs gated per mode.
      MODE: ${MODE:-personal}
      # DATABASE_URL is intentionally NOT set until M0 #0.8 wires the
      # sqlx pool; /readyz returns 503 with checks.database=null until
      # then. Compose's healthcheck below targets /healthz instead so
      # the container reports healthy and downstream services can start.
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Liveness only — switch to /readyz in M0 #0.8 when the real
      # database ping is wired up.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      PORT: "3000"
      HOST: 0.0.0.0
      ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      # Node 22 ships `fetch`; no need for curl in the image.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

  etl-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.etl
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # DATABASE_URL added when M0 #0.8 ships the sqlx pool.
    depends_on:
      postgres:
        condition: service_healthy
    # Placeholder binary exits after printing — set restart to "no" so
    # compose doesn't loop. Switch to "unless-stopped" once etl-worker
    # actually runs a long-lived scheduler in M1 #1.4 onward.
    restart: "no"

volumes:
  pgdata:
    name: taiwan-data-hub_pgdata

networks:
  default:
    name: tdh-internal
