# Source of truth for the dataset records surfaced on /datasets/[id]
# and /domains/[slug] until the storage / ETL layer (M3) populates the
# real Postgres tables. The marketplace UI reads from this YAML via
# `web/src/lib/datasets/load.ts`.
#
# Schema (validated at module load by load.ts):
#   slug:           stable kebab-case identifier, also the URL segment
#   domain_slug:    FK into config/domains.yaml — must exist there
#   sort_order:     finite number, lower first within a domain
#   name:           i18n map; zh-TW required, en recommended
#   description:    i18n map; zh-TW required, en recommended
#   tier:           one of gold | silver | bronze (popularity x authority)
#   format:         one of csv | json | geojson | xlsx | parquet | xml
#   license:        free-form; conventional values include
#                   "CC-BY 4.0", "CC0", "OGL Taiwan 1.0", "Public Domain"
#   source:
#     publisher:    issuing agency, zh-TW
#     url:          canonical landing page on the publisher's site
#   updated:        one of daily | weekly | monthly | quarterly | yearly
#   resources:      list of { kind, label, url }
#                   kind ∈ { download | api }; label is i18n-free for now
#
# Adding a dataset: append a block here. The cross-reference checks in
# load.ts enforce that (a) domain_slug exists in config/domains.yaml
# and (b) every anchor slug in config/collections.yaml exists here, so
# this seed cannot silently drift from the other two YAMLs.

