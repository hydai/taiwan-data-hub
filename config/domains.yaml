# Source of truth for the 20 dataset domains shown in the marketplace UI.
#
# Schema:
#   slug:        stable kebab-case identifier; matches /data/<slug> URL
#   kind:        topical | meta | horizontal — controls section grouping
#   sort_order:  display order within its kind (lower first)
#   name:        i18n map; zh-TW required, en recommended
#   description: optional. If present, must be a mapping with a non-empty
#                zh-TW string (and optionally en, etc.) — validated by
#                scripts/regen-domain-seed.py before SQL emission.
#
# Block-style mappings (not flow `{k: v, …}`) because the en values
# contain commas which would confuse YAML's flow-map parser.
#
# Re-run scripts/regen-domain-seed.py after editing; commit both
# files together so the seed migration stays in lockstep with the YAML.

