name: CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

# Concurrency rules:
#   - For PRs: group by PR number so a fresh push cancels the in-flight run
#     for the same PR (cancel-in-progress: true).
#   - For push to main: group by commit SHA so every commit has its own
#     unique slot and runs to completion — important since GitHub
#     concurrency keeps only 1 running + 1 pending per group, so a shared
#     group would drop intermediate main commits even with
#     cancel-in-progress: false.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      # Reads rust-toolchain.toml automatically (channel = stable).
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Share cache between fmt/clippy/test invocations in this job.
          # Only save fresh artifacts on main-branch runs so PR forks
          # don't fight over the cache.
          shared-key: rust-release
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy --release --all-targets -- -D warnings
        run: cargo clippy --release --all-targets -- -D warnings
      - name: cargo test --release
        run: cargo test --release

  web:
    name: Web (check / lint / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup picks up the version from package.json's
      # `packageManager` field (pnpm@10.13.1) — single source of truth.
      # Must run before setup-node so the latter's cache: pnpm finds it.
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile
      - name: pnpm check (svelte-check)
        run: pnpm check
      - name: pnpm lint (prettier + eslint)
        run: pnpm lint
      - name: pnpm build (adapter-node)
        run: pnpm build
